<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070d19"/>
      <stop offset="0.55" stop-color="#101024"/>
      <stop offset="1" stop-color="#24113a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="230" fill="#a855f7" opacity=".09" filter="url(#glow)"/>
  <circle cx="180" cy="760" r="260" fill="#22d3ee" opacity=".07" filter="url(#glow)"/>

  <g transform="translate(90 72)">
    <rect width="58" height="58" rx="16" fill="url(#accent)"/>
    <g stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".94">
      <path d="M14 29v-7M21 29V16M28 29V11M35 29V18M42 29v-5"/>
      <path d="M14 29v7M21 29v13M28 29v18M35 29v11M42 29v6" opacity=".72"/>
    </g>
    <text x="78" y="25" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700">Speech Cleaner</text>
    <text x="78" y="49" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">Privacy-first Azerbaijani speech workflow for macOS</text>
  </g>

  <text x="90" y="230" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="61" font-weight="750">From raw recording to</text>
  <text x="90" y="300" fill="url(#accent)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="61" font-weight="750">ready-to-edit assets.</text>

  <g transform="translate(90 386)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(0 0)">
      <rect width="320" height="260" rx="28" fill="#ffffff" opacity=".055" stroke="#ffffff" stroke-opacity=".10"/>
      <circle cx="52" cy="52" r="23" fill="#22d3ee" opacity=".16"/>
      <path d="M39 52h6l5-14 8 29 6-22 5 7h6" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="28" y="110" fill="#22d3ee" font-size="15" font-weight="700" letter-spacing="2">01  CLEAN</text>
      <text x="28" y="150" fill="#f8fafc" font-size="28" font-weight="700">Reduce noise</text>
      <text x="28" y="184" fill="#94a3b8" font-size="19">Filter steady background</text>
      <text x="28" y="212" fill="#94a3b8" font-size="19">noise and balance loudness.</text>
    </g>

    <g transform="translate(350 0)">
      <rect width="320" height="260" rx="28" fill="#ffffff" opacity=".055" stroke="#ffffff" stroke-opacity=".10"/>
      <circle cx="52" cy="52" r="23" fill="#38bdf8" opacity=".16"/>
      <path d="M40 52h24M47 42v20M57 46v12" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
      <text x="28" y="110" fill="#38bdf8" font-size="15" font-weight="700" letter-spacing="2">02  TRIM</text>
      <text x="28" y="150" fill="#f8fafc" font-size="28" font-weight="700">Shorten pauses</text>
      <text x="28" y="184" fill="#94a3b8" font-size="19">Keep speech natural while</text>
      <text x="28" y="212" fill="#94a3b8" font-size="19">removing awkward silence.</text>
    </g>

    <g transform="translate(700 0)">
      <rect width="320" height="260" rx="28" fill="#ffffff" opacity=".055" stroke="#ffffff" stroke-opacity=".10"/>
      <circle cx="52" cy="52" r="23" fill="#818cf8" opacity=".16"/>
      <rect x="39" y="43" width="26" height="18" rx="5" fill="none" stroke="#818cf8" stroke-width="3"/>
      <path d="M44 49h16M44 55h10" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
      <text x="28" y="110" fill="#818cf8" font-size="15" font-weight="700" letter-spacing="2">03  TRANSCRIBE</text>
      <text x="28" y="150" fill="#f8fafc" font-size="28" font-weight="700">Map every word</text>
      <text x="28" y="184" fill="#94a3b8" font-size="19">Local Azerbaijani speech</text>
      <text x="28" y="212" fill="#94a3b8" font-size="19">recognition and timestamps.</text>
    </g>

    <g transform="translate(1050 0)">
      <rect width="320" height="260" rx="28" fill="#ffffff" opacity=".055" stroke="#ffffff" stroke-opacity=".10"/>
      <circle cx="52" cy="52" r="23" fill="#a855f7" opacity=".16"/>
      <path d="M42 42h18l7 7v16H42zM60 42v8h7" fill="none" stroke="#a855f7" stroke-width="3" stroke-linejoin="round"/>
      <text x="28" y="110" fill="#a855f7" font-size="15" font-weight="700" letter-spacing="2">04  EXPORT</text>
      <text x="28" y="150" fill="#f8fafc" font-size="28" font-weight="700">Create the pack</text>
      <text x="28" y="184" fill="#94a3b8" font-size="19">WAV, M4A, SRT, TXT,</text>
      <text x="28" y="212" fill="#94a3b8" font-size="19">CSV, JSON, and MP4.</text>
    </g>
  </g>

  <g transform="translate(90 718)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="1370" height="100" rx="25" fill="#07111c" stroke="#22d3ee" stroke-opacity=".22"/>
    <circle cx="52" cy="50" r="17" fill="#10b981" opacity=".17"/>
    <path d="M45 50l5 5 10-12" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="88" y="43" fill="#f8fafc" font-size="22" font-weight="700">100% on-device processing</text>
    <text x="88" y="69" fill="#94a3b8" font-size="17">No account. No analytics. No recording upload.</text>
    <text x="1280" y="42" text-anchor="end" fill="#f8fafc" font-size="25" font-weight="700">~5.4×</text>
    <text x="1280" y="68" text-anchor="end" fill="#94a3b8" font-size="17">real-time on M4 Pro</text>
  </g>
</svg>
