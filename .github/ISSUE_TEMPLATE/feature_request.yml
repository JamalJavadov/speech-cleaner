name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and performance impact
      description: Does the idea add networking, storage, dependencies, or heavier processing?

