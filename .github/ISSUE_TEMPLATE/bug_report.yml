name: Bug report
description: Report a reproducible Speech Cleaner problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Speech Cleaner. Remove personal data from logs and do not upload private recordings.
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: macOS 15.5, MacBook Pro M3 Pro
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: FFmpeg and whisper.cpp versions
      placeholder: ffmpeg 8.x, whisper.cpp 1.x
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: What did you do, and what happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots

